<div class="stock-movement-list">
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando movimientos...</p>
  </div>

  <div *ngIf="error && !loading" class="error">
    <p>{{ error }}</p>
    <button (click)="loadMovements()" class="btn-retry">Reintentar</button>
  </div>

  <div *ngIf="!loading && !error && movements.length === 0" class="empty">
    <p>No se encontraron movimientos</p>
  </div>

  <div *ngIf="!loading && !error && movements.length > 0" class="movements-grid">
    <div *ngFor="let movement of movements" class="movement-card">
      <div class="movement-header">
        <h3>{{ movement.type | uppercase }}</h3>
        <span class="reason-badge">{{ movement.reason }}</span>
      </div>
      <div class="movement-info">
        <p><strong>Producto:</strong> {{ movement.productId }}</p>
        <p><strong>Cantidad:</strong> {{ movement.quantity }}</p>
        <p><strong>Fecha:</strong> {{ movement.timestamp | date:'short' }}</p>
      </div>
      <div *ngIf="showActions()" class="movement-actions">
        <button (click)="onSelectMovement(movement)" class="btn btn-info btn-sm">Ver</button>
        <button (click)="onEditMovement(movement)" class="btn btn-warning btn-sm">Editar</button>
        <button (click)="onDeleteMovement(movement)" class="btn btn-danger btn-sm">Eliminar</button>
      </div>
    </div>
  </div>
</div>
