<div class="d-flex flex-column flex-lg-row-fluid py-10">
  <div class="container-xxl">
    <div class="card mb-5">
      <div class="card-header">
        <h3 class="card-title align-items-start flex-column">
          <span class="card-label fw-bold fs-3 mb-1">Mis Ventas</span>
          <span class="text-muted fw-semibold fs-7">Listado de tus ventas</span>
        </h3>
      </div>

      <div class="card-body">
        <div class="row mb-6 gy-3">
          <div class="col-md-3">
            <label class="form-label">Desde</label>
            <input type="date" class="form-control" [(ngModel)]="startDate" (change)="resetPage()" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Hasta</label>
            <input type="date" class="form-control" [(ngModel)]="endDate" (change)="resetPage()" />
          </div>

          <!-- 👇 SELECT DE ESTADO -->
          <div class="col-md-2">
            <label class="form-label">Estado</label>
            <select class="form-select" [(ngModel)]="selectedStatus" (change)="resetPage()">
              <option [ngValue]="''">Todos</option>
              <option [ngValue]="saleStatus.PENDING">Pendiente</option>
              <option [ngValue]="saleStatus.CONFIRMED">Confirmada</option>
              <option [ngValue]="saleStatus.DELIVERED">Entregada</option>
              <option [ngValue]="saleStatus.CANCELLED">Cancelada</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Buscar</label>
            <input type="text" class="form-control" placeholder="Número de venta" [(ngModel)]="search" (input)="resetPage()" />
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-row-bordered table-row-gray-300 gy-4">
            <thead>
              <tr class="fw-semibold fs-6 text-gray-800">
                <th>Número</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>Estado</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let sale of data">
                <td>{{ sale.saleNumber }}</td>
                <td>{{ sale.customerId.fullName }}</td>
                <td>{{ sale.saleDate | date:'short' }}</td>
                <td>${{ sale.totals.totalAmount }}</td>
                <td>
                  <span class="badge"
                        [ngClass]="{
                          'badge-light-warning': sale.status === saleStatus.PENDING,
                          'badge-light-success': sale.status === saleStatus.CONFIRMED,
                          'badge-light-primary': sale.status === saleStatus.DELIVERED,
                          'badge-light-danger': sale.status === saleStatus.CANCELLED
                        }">
                    {{ sale.status }}
                  </span>
                </td>
                <td class="text-end">
                  <a [routerLink]="[sale._id]" class="btn btn-icon btn-bg-light btn-active-color-primary btn-sm">
                    <span class="svg-icon svg-icon-3">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M17.5 11H6.5C5 11 4 10 4 8.5V6C4 4.5 5 3.5 6.5 3.5H17.5C19 3.5 20 4.5 20 6V8.5C20 10 19 11 17.5 11Z" stroke="currentColor" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M17.5 20.5H6.5C5 20.5 4 19.5 4 18V15.5C4 14 5 13 6.5 13H17.5C19 13 20 14 20 15.5V18C20 19.5 19 20.5 17.5 20.5Z" stroke="currentColor" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                    </span>
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-6">
          <button class="btn btn-sm btn-light" (click)="prev()" [disabled]="page === 1">Anterior</button>
          <span class="text-muted">Página {{ page }} de {{ totalPages }}</span>
          <button class="btn btn-sm btn-light" (click)="next()" [disabled]="page === totalPages">Siguiente</button>
        </div>

      </div>
    </div>
  </div>
</div>
