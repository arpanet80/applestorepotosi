<div class="card card-flush">
  <div class="card-header">
    <div class="card-title"><h3>Detalle de Producto</h3></div>
    <div class="card-toolbar">
      <a routerLink="/dashboard/technician-products" class="btn btn-sm btn-light-primary">
        <i class="ki-duotone ki-arrow-left fs-2"></i>Volver
      </a>
    </div>
  </div>

  <div class="card-body pt-0" *ngIf="!loading && product">
    <div class="row mb-6">
      <div class="col-md-4 text-center">
        <img [src]="product.imageUrl || '/assets/imgs/product-no-image.png'"
             class="img-fluid rounded mb-3" style="max-height: 200px;">
      </div>
      <div class="col-md-8">
        <table class="table table-row-bordered gy-4">
          <tr><td class="fw-bold">Nombre</td><td>{{ product.name }}</td></tr>
          <tr><td class="fw-bold">SKU</td><td>{{ product.sku }}</td></tr>
          <tr><td class="fw-bold">Precio venta</td><td>$ {{ product.salePrice | number:'1.2-2' }}</td></tr>
          <tr><td class="fw-bold">Stock disponible</td>
              <td><span class="badge" [ngClass]="{
                'badge-light-success':product.stockStatus==='in-stock',
                'badge-light-warning':product.stockStatus==='low-stock',
                'badge-light-danger':product.stockStatus==='out-of-stock'
              }">{{ product.availableQuantity || 0 }}</span></td>
          </tr>
          <tr><td class="fw-bold">Categoría</td><td>{{ product.categoryId?.name || '—' }}</td></tr>
          <tr><td class="fw-bold">Descripción</td><td>{{ product.description || '—' }}</td></tr>
        </table>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-10">
    <div class="spinner-border text-primary"></div>
  </div>
</div>
