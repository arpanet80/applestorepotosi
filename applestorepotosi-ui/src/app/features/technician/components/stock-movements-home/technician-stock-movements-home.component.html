  <div class="card-body pt-0">
    <app-spinner *ngIf="loading" message="Cargando movimientos…" size="md"></app-spinner>

    <div class="table-responsive" *ngIf="!loading">
      <app-tabla-generica [data]="movements"
                          [tablaColumns]="columns"
                          [tablaOpciones]="tablaOpciones"
                          (btnTableAction)="onTableAction($event)"
                          (btnExtra)="onBtnExtra($event)">
      </app-tabla-generica>
    </div>

    <div *ngIf="!loading && movements.length === 0" class="text-center text-muted py-10">
      No hay movimientos registrados
    </div>
  </div>
</div>
