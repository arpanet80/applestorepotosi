<!-- src/app/brands/components/brand-list/brand-list.component.html -->
<div class="brand-list">
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando marcas...</p>
  </div>

  <div *ngIf="error && !loading" class="error">
    <p>{{ error }}</p>
    <button (click)="loadBrands()" class="btn-retry">Reintentar</button>
  </div>

  <div *ngIf="!loading && !error && brands.length === 0" class="empty">
    <p>No se encontraron marcas</p>
  </div>

  <div *ngIf="!loading && !error && brands.length > 0" class="brands-grid">
    <div *ngFor="let brand of brands" class="brand-card" [class.inactive]="!brand.isActive">
      <div class="brand-header">
        <h3 class="brand-name" (click)="onSelectBrand(brand)">{{ brand.name }}</h3>
        <span class="active-badge" [class.active]="brand.isActive">
          {{ brand.isActive ? 'Activo' : 'Inactivo' }}
        </span>
      </div>

      <div class="brand-info">
        <div class="info-row">
          <span class="label">País:</span>
          <span class="value">{{ brand.country || '—' }}</span>
        </div>
        <div class="info-row">
          <span class="label">Sitio web:</span>
          <span class="value">
            <a *ngIf="brand.website" [href]="brand.website" target="_blank" rel="noopener">Visitar</a>
            <span *ngIf="!brand.website">—</span>
          </span>
        </div>
      </div>

      <div *ngIf="showActions()" class="brand-actions">
        <button (click)="onSelectBrand(brand)" class="btn btn-info btn-sm">Ver</button>
        <button (click)="onEditBrand(brand)" class="btn btn-warning btn-sm">Editar</button>
        <button (click)="toggleActive(brand)" class="btn btn-secondary btn-sm">
          {{ brand.isActive ? 'Desactivar' : 'Activar' }}
        </button>
        <button (click)="onDeleteBrand(brand)" class="btn btn-danger btn-sm">Eliminar</button>
      </div>
    </div>
  </div>
</div>
