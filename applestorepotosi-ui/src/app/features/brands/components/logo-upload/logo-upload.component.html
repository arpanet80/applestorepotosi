<!--begin::Logo upload card-->
<div class="card card-flush">
  <div class="card-body">
    <div
      class="dashed-border-area rounded p-8 text-center cursor-pointer"
      (drop)="onDrop($event)"
      (dragover)="onDragOver($event)"
      (click)="fileInput.click()">
      <input
        #fileInput
        type="file"
        accept="image/jpeg,image/jpg,image/png,image/webp"
        (change)="onFileSelected($event)"
        hidden />
      <div class="text-gray-600">
        <i class="ki-duotone ki-cloud-upload fs-3x text-primary mb-3"></i>
        <div class="fw-semibold fs-6 mb-1">
          Arrastra el logo aquí o
          <span class="link-primary">selecciona</span>
        </div>
        <small class="text-gray-500">JPG, PNG, WebP · Máx 4 MB</small>
      </div>
    </div>

    <!-- Preview -->
    <div *ngIf="preview" class="mt-6 text-center">
      <img
        [src]="preview"
        alt="Logo preview"
        class="rounded w-150px h-75px object-fit-contain border p-2 bg-light">
      <div class="mt-3">
        <button
          (click)="cancel()"
          class="btn btn-sm btn-flex btn-light btn-active-light-danger">
          <i class="ki-duotone ki-trash fs-3"></i>Eliminar
        </button>
      </div>
    </div>
  </div>
</div>
<!--end::Logo upload card-->
