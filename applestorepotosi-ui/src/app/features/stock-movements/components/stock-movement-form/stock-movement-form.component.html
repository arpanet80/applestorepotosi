<!-- begin::Root -->
<div class="d-flex flex-column flex-root">
  <div class="page d-flex flex-row flex-column-fluid">
    <div class="wrapper d-flex flex-column flex-row-fluid" id="kt_wrapper">

      <!-- begin::Page -->
      <div class="content fs-6 d-flex flex-column flex-column-fluid" id="kt_content">
        <div class="container-xxl">
          <!-- begin::Card -->
          <div class="card card-flush">
            <!-- 
            <div class="card-header align-items-center py-5 gap-2 gap-md-5">
              <div class="card-title">
                <h2 class="d-flex align-items-center fs-2 fw-bold">
                  <span class="svg-icon svg-icon-1 me-2">
                    <em class="bi bi-box-seam text-primary"></em>
                  </span>
                  {{ isEditMode ? 'Editar Movimiento' : 'Crear Movimiento de Stock' }}
                </h2>
              </div>
              <div class="card-toolbar">
                <a
                  routerLink="/dashboard/stock-movements"
                  class="btn btn-sm btn-light-primary">
                  <em class="bi bi-arrow-left me-2"></em>Volver
                </a>
              </div>
            </div>
             -->

            <div class="card-body pt-0">
              <form
                *ngIf="!loading"
                [formGroup]="movementForm"
                (ngSubmit)="onSubmit()"
                novalidate>

                <!-- Información General -->
                <div class="mb-6">
                  <h3 class="text-gray-800 fw-bold mb-4">Información General</h3>
                  <div class="row g-6">
                    <div class="col-md-6 col-lg-4">
                      <label class="form-label required">Producto</label>
                      <select
                        formControlName="productId"
                        class="form-select form-select-solid">
                        <option value="" disabled>Seleccione un producto</option>
                        <option *ngFor="let p of products" [value]="p._id">
                          {{ p.name }}
                        </option>
                      </select>
                    </div>

                    <div class="col-md-6 col-lg-4">
                      <label class="form-label required">Tipo</label>
                      <select
                        formControlName="type"
                        class="form-select form-select-solid">
                        <option *ngFor="let t of types" [value]="t">
                          {{ t | uppercase }}
                        </option>
                      </select>
                    </div>

                    <div class="col-md-6 col-lg-4">
                      <label class="form-label required">Cantidad</label>
                      <input
                        type="number"
                        min="1"
                        formControlName="quantity"
                        class="form-control form-control-solid" />
                    </div>

                    <div class="col-md-6 col-lg-4">
                      <label class="form-label required">Razón</label>
                      <select
                        formControlName="reason"
                        class="form-select form-select-solid">
                        <option *ngFor="let r of reasons" [value]="r">
                          {{ r | titlecase }}
                        </option>
                      </select>
                    </div>

                    <div class="col-md-6 col-lg-4">
                      <label class="form-label">Fcha y Hora</label>
                      <input
                        type="datetime-local"
                        formControlName="timestamp"
                        class="form-control form-control-solid" />
                    </div>
                  </div>
                </div>

                <!-- Stock -->
                <div class="mb-6">
                  <h3 class="text-gray-800 fw-bold mb-4">Stock</h3>
                  <div class="row g-6">
                    <div class="col-md-6">
                      <label class="form-label required">Stock Anterior</label>
                      <input
                        type="number"
                        min="0"
                        formControlName="previousStock"
                        class="form-control form-control-solid" />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label required">Stock Nuevo</label>
                      <input
                        type="number"
                        min="0"
                        formControlName="newStock"
                        class="form-control form-control-solid" />
                    </div>
                  </div>
                </div>

                <!-- Referencia (Opcional) -->
                <div class="mb-6">
                  <h3 class="text-gray-800 fw-bold mb-4">Referencia <small class="text-muted">(Opcional)</small></h3>
                  
                  <div class="row g-6">
                    <div class="col-md-6">
                      <label class="form-label">Referencia ID</label>
                      <input
                        type="text"
                        formControlName="reference"
                        readonly
                        class="form-control form-control-solid"
                        placeholder="ID de referencia" />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Modelo de Referencia</label>
                      <select
                        formControlName="referenceModel"
                        class="form-select form-select-solid">
                        <option value="">Ninguno</option>
                        <option *ngFor="let m of referenceModels" [value]="m">
                          {{ m }}
                        </option>
                      </select>
                    </div>
                  </div>
                </div>

                <!-- Notas -->
                <div class="mb-8">
                  <h3 class="text-gray-800 fw-bold mb-4">Notas</h3>
                  <textarea
                    formControlName="notes"
                    rows="3"
                    class="form-control form-control-solid"
                    placeholder="Observaciones..."></textarea>
                </div>

                <!-- Acciones -->
                <div class="d-flex justify-content-end gap-3">
                  <button
                    type="button"
                    (click)="onCancel()"
                    class="btn btn-light-secondary">
                    Cancelar
                  </button>
                  <button
                    type="submit"
                    class="btn btn-primary"
                    [disabled]="movementForm.invalid || submitting">
                    <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
                    {{ submitting ? 'Guardando...' : (isEditMode ? 'Actualizar' : 'Crear') }}
                  </button>
                </div>

                <!-- Global error -->
                <div *ngIf="error" class="alert alert-danger mt-6 mb-0">
                  <em class="bi bi-exclamation-triangle me-2"></em>{{ error }}
                </div>
              </form>
            </div>
          </div>
          <!-- end::Card -->
        </div>
      </div>
      <!-- end::Page -->
    </div>
  </div>
</div>
<!-- end::Root -->
