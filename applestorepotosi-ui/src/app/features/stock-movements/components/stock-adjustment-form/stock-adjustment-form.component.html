<!-- begin::Root -->
<div class="d-flex flex-column flex-root">
  <div class="page d-flex flex-row flex-column-fluid">
    <div class="wrapper d-flex flex-column flex-row-fluid" id="kt_wrapper">

      <!-- begin::Page -->
      <div class="content fs-6 d-flex flex-column flex-column-fluid" id="kt_content">
        <div class="container-xxl">
          <!-- begin::Card -->
          <div class="card card-flush">
            <!-- 
            <div class="card-header align-items-center py-5 gap-2 gap-md-5">
              <div class="card-title">
                <h2 class="d-flex align-items-center fs-2 fw-bold">
                  <span class="svg-icon svg-icon-1 me-2">
                    <em class="bi bi-sliders text-primary"></em>
                  </span>
                  Ajuste de Stock
                </h2>
              </div>
              <div class="card-toolbar">
                <a
                  routerLink="/dashboard/stock-movements"
                  class="btn btn-sm btn-light-primary">
                  <em class="bi bi-arrow-left me-2"></em>Volver
                </a>
              </div>
            </div>
             -->

            <div class="card-body pt-0">
              <form
                [formGroup]="adjustmentForm"
                (ngSubmit)="onSubmit()"
                novalidate>

                <!-- Información del Ajuste -->
                <div class="mb-6">
                  <h3 class="text-gray-800 fw-bold mb-4">Información del Ajuste</h3>
                  <div class="row g-6">
                    <div class="col-md-6">
                      <label class="form-label required">Producto</label>
                      <select
                        formControlName="productId"
                        class="form-select form-select-solid">
                        <option [ngValue]="''" disabled>Seleccione un producto</option>
                        <option *ngFor="let p of products" [value]="p._id">
                          {{ p.name }}
                        </option>
                      </select>
                    </div>

                    <div class="col-md-6">
                      <label class="form-label required">Nueva Cantidad</label>
                      <input
                        type="number"
                        min="0"
                        formControlName="newQuantity"
                        class="form-control form-control-solid" />
                    </div>

                    <div class="col-md-6">
                      <label class="form-label required">Motivo</label>
                      <select
                        formControlName="reason"
                        class="form-select form-select-solid">
                        <option value="manual">Manual</option>
                        <option value="damaged">Dañado</option>
                        <option value="expired">Vencido</option>
                        <option value="correction">Corrección</option>
                      </select>
                    </div>

                    <div class="col-md-12">
                      <label class="form-label">Notas</label>
                      <textarea
                        formControlName="notes"
                        rows="3"
                        class="form-control form-control-solid"
                        placeholder="Observaciones..."></textarea>
                    </div>
                  </div>
                </div>

                <!-- Acciones -->
                <div class="d-flex justify-content-end gap-3">
                  <button
                    type="button"
                    (click)="onCancel()"
                    class="btn btn-light-secondary">
                    Cancelar
                  </button>
                  <button
                    type="submit"
                    class="btn btn-primary"
                    [disabled]="adjustmentForm.invalid || submitting">
                    <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
                    {{ submitting ? 'Guardando...' : 'Crear Ajuste' }}
                  </button>
                </div>

                <!-- Global error -->
                <div *ngIf="error" class="alert alert-danger mt-6 mb-0">
                  <em class="bi bi-exclamation-triangle me-2"></em>{{ error }}
                </div>
              </form>
            </div>
          </div>
          <!-- end::Card -->
        </div>
      </div>
      <!-- end::Page -->
    </div>
  </div>
</div>
<!-- end::Root -->
