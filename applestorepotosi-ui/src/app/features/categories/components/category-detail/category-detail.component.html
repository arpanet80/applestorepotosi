<div class="card mb-5 mb-xl-10" *ngIf="!loading && category">

  <div class="d-flex justify-content-between align-items-start">
    <!-- Título y badge -->
    <div class="grow me-4">
      <h3 class="fw-bold fs-3 text-gray-800 mb-1">{{ category.name }}</h3>
      <span
        class="badge"
        [ngClass]="category.isActive ? 'badge-light-success' : 'badge-light-danger'">
        {{ category.isActive ? 'Activa' : 'Inactiva' }}
      </span>
    </div>

    <!-- Botones -->
    <div class="d-flex gap-2 shrink-0" *ngIf="canEdit">
      <button (click)="onEdit()" class="btn btn-sm btn-primary">
        <i class="bi bi-pencil fs-2"></i>Editar
      </button>
      <button (click)="onToggleActive()" class="btn btn-sm btn-secondary">
        <i class="fas fa-toggle-on fs-3"></i>
        {{ category.isActive ? 'Desactivar' : 'Activar' }}
      </button>
      <button (click)="onView()" class="btn btn-sm btn-danger">
        <i class="bi-arrow-left-short fs-2"></i>Volver
      </button>
    </div>
  </div>

  <div class="card-body">
    <div class="row">
      <div class="col-md-6 mb-5">
        <h5 class="fw-semibold text-gray-700 mb-3">Información General</h5>
        <div class="d-flex flex-column gap-2">
          <span><strong>Slug:</strong> {{ category.slug }}</span>
          <span><strong>Descripción:</strong> {{ category.description || 'Sin descripción' }}</span>
          <span><strong>Categoría padre:</strong> {{ category.parentId || 'Ninguna' }}</span>
        </div>
      </div>

      <div class="col-md-6 mb-5" *ngIf="category.imageUrl">
        <h5 class="fw-semibold text-gray-700 mb-3">Imagen</h5>
        <img [src]="category.imageUrl" alt="Imagen de {{ category.name }}" class="img-fluid rounded" style="max-height: 150px; object-fit: contain;" />
      </div>
    </div>
  </div>
</div>

<!-- Estado de carga -->
<div *ngIf="loading" class="d-flex justify-content-center align-items-center py-10">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Cargando...</span>
  </div>
</div>

<!-- Estado de error -->
<div *ngIf="error && !loading" class="alert alert-danger text-center py-5">
  <h5 class="fw-bold">Error</h5>
  <p>{{ error }}</p>
  <a routerLink="/dashboard/categories" class="btn btn-sm btn-primary mt-3">Volver</a>
</div>
