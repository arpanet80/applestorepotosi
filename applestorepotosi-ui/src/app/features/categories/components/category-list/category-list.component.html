<div class="category-list">
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando categorías...</p>
  </div>

  <div *ngIf="error && !loading" class="error">
    <p>{{ error }}</p>
    <button (click)="loadCategories()" class="btn-retry">Reintentar</button>
  </div>

  <div *ngIf="!loading && !error && categories.length === 0" class="empty">
    <p>No se encontraron categorías</p>
  </div>

  <div *ngIf="!loading && !error && categories.length > 0" class="categories-grid">


    <!-- HTML Component -->
    <div *ngFor="let category of categories" class="card shadow-sm" [class.opacity-50]="!category.isActive">
      <!-- Card Header -->
      <div class="card-header">
        <h3 class="card-title fw-bold cursor-pointer" (click)="onSelectCategory(category)">
          {{ category.name }}
        </h3>
        <div class="card-toolbar">
          <span class="badge" [ngClass]="category.isActive ? 'badge-success' : 'badge-danger'">
            {{ category.isActive ? 'Activa' : 'Inactiva' }}
          </span>
        </div>
      </div>

      <!-- Card Body -->
      <div class="card-body py-4">
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="text-gray-600 fw-semibold fs-7">Slug:</span>
            <span class="text-gray-800 fs-7">{{ category.slug }}</span>
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <span class="text-gray-600 fw-semibold fs-7">Padre:</span>
            <span class="text-gray-800 fs-7">{{ category.parentId || '—' }}</span>
          </div>
        </div>
      </div>

      <!-- Card Footer -->
      <div *ngIf="showActions()" class="card-footer d-flex flex-wrap gap-2 py-3">
        <button (click)="onSelectCategory(category)" title="Ver"  class="btn btn-sm btn-light-primary">
          <i class="ki-duotone ki-eye fs-3">
            <span class="path1"></span>
            <span class="path2"></span>
            <span class="path3"></span>
          </i>
          <!-- Ver -->
        </button>
        <button (click)="onEditCategory(category)" title="Editar"  class="btn btn-sm btn-light-warning">
          <i class="ki-duotone ki-pencil fs-3">
            <span class="path1"></span>
            <span class="path2"></span>
          </i>
          <!-- Editar -->
        </button>
        <button (click)="toggleActive(category)" title="Activar / Desactivar" class="btn btn-sm btn-light-danger">
          <i class="fas fa-toggle-on fs-3" *ngIf="category.isActive"></i>
          <i class="fas fa-toggle-off fs-3" *ngIf="!category.isActive"></i>
          <!-- {{ category.isActive ? 'Desactivar' : 'Activar' }} -->
        </button>
        <!-- <button (click)="onDeleteCategory(category)" class="btn btn-sm btn-light-secondary">
          <i class="ki-duotone ki-trash fs-3">
            <span class="path1"></span>
            <span class="path2"></span>
            <span class="path3"></span>
            <span class="path4"></span>
            <span class="path5"></span>
          </i>
          Eliminar
        </button> -->
      </div>
    </div>



  </div>
</div>
