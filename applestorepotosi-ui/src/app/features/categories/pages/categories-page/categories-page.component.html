<!--begin::Toolbar-->
<div class="d-flex flex-wrap flex-stack mb-6">
    <!--begin::Title-->
    <h3 class="fw-bold my-2">
        Categorías 
        <span class="fs-6 text-gray-500 fw-semibold ms-1">({{ categories.length }})</span>
    </h3>
    <!--end::Title-->

    <!--begin::Controls-->
    <div class="d-flex align-items-center my-2">

      <!-- 🔍 Buscador con debounce -->
      <div class="position-relative">
        <i class="bi bi-search fs-2 position-absolute ms-3 top-50 translate-middle-y"></i>
        <input
          type="text"
          class="form-control form-control-solid w-250px ps-10 pe-10"
          placeholder="Buscar categoría..."
          [formControl]="searchControl"
        />
        <i *ngIf="searchControl.value" (click)="clearSearch()" class="bi bi-x-lg fs-4 position-absolute end-0 top-50 translate-middle-y me-3 cursor-pointer text-hover-primary"></i>
      </div>

      <!--begin::Select wrapper-->
      <!-- <div class="w-100px me-5">
          <select name="status" appSelect2 data-control="select2" data-hide-search="true" class="form-select form-select-sm bg-body border-body">
              <option value="1" selected>30 Days</option>
              <option value="2">90 Days</option>
              <option value="3">6 Months</option>
              <option value="4">1 Year</option>
          </select>
      </div> -->
      <!--end::Select wrapper-->

      <!-- ➕ Nueva categoría -->
      <button *ngIf="canCreate" (click)="onCreateCategory()" class="btn btn-primary btn-sm" >
        <i class="ki-duotone ki-plus fs-2 me-2"></i>
        Nueva Categoría
      </button>

      <!-- ⚙️ Gestión avanzada -->
      <button *ngIf="canManage" (click)="onManageCategories()" class="btn btn-secondary btn-sm" >
        <i class="ki-duotone ki-setting-2 fs-2 me-2"></i>
        Gestión Avanzada
      </button>

      <!-- 🔄 Actualizar -->
      <button (click)="onRefresh()" class="btn btn-outline btn-outline-primary btn-sm" [disabled]="loading" >
        <i class="ki-duotone ki-arrows-circle fs-2"></i>
        Actualizar
      </button>

    </div>
    <!--end::Controls-->
</div>
<!--end::Toolbar-->

<!--begin::List widget 20-->
<div class="card h-xl-100">
    <!--begin::Body-->
    <div class="card-body pt-6">

        <!-- Estados -->
        <div *ngIf="loading" class="loading-state">
          <div class="spinner"></div>
          <p>Cargando categorías...</p>
        </div>

        <div *ngIf="error && !loading" class="error-state">
          <h3>Error al cargar categorías</h3>
          <p>{{ error }}</p>
          <button (click)="loadCategories()" class="btn btn-primary">Reintentar</button>
        </div>

        <!--begin::Loading-->
        <div *ngIf="loading" class="d-flex justify-content-center py-10">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
        </div>
        <!--end::Loading-->


        

        <!-- ----------------- Aqui entra la tabla -------------- -->
        <div *ngIf="!loading && !error" class="categories-section">
          <app-category-list
            [filters]="{ search: searchTerm, isActive: activeFilter === 'all' ? undefined : activeFilter === 'active' }"
            [showActions]="true"
            (categorySelected)="onSelectCategory($event)"
            (categoryEdit)="onEditCategory($event)"
            (categoryDelete)="onDeleteCategory($event)"
          ></app-category-list>

          <div *ngIf="categories.length === 0" class="empty-state">
            <div class="empty-icon">📂</div>
            <h3>No se encontraron categorías</h3>
            <p *ngIf="searchTerm || activeFilter !== 'all'">
              Ajusta los filtros o
              <button (click)="clearSearch(); activeFilter = 'all'; loadCategories()" class="btn-link">muestra todas</button>.
            </p>
            <p *ngIf="!searchTerm && activeFilter === 'all'">
              No hay categorías registradas.
              <button *ngIf="canCreate" (click)="onCreateCategory()" class="btn-link">Crear la primera</button>
            </p>
          </div>
        </div>

<!--begin::Tree card-->
<div class="card card-flush mt-6" *ngIf="treeNodes.length > 0">
  <div class="card-header">
    <h3 class="card-title">Árbol de categorías</h3>
  </div>
  <div class="card-body">
    <div class="tree-container">
      <app-category-tree
        [nodes]="treeNodes"
        [showActions]="true"
        (nodeEdit)="onEditCategory($event)"
        (nodeDelete)="onDeleteCategory($event)"
        (nodeAddChild)="onCreateChildCategory($event)"
      ></app-category-tree>
    </div>
  </div>
</div>

<ng-template #noTree>
  <p class="empty-tree">Cargando árbol de categorías...</p>
</ng-template>
