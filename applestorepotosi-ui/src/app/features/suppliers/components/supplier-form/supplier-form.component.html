<div class="card mb-5 mb-xl-10">
  <div class="card-header">
    <h3 class="card-title align-items-start flex-column">
      <span class="card-label fw-bold fs-3 mb-1">
        {{ isEditMode ? 'Editar Proveedor' : 'Crear Proveedor' }}
      </span>
      <span class="text-muted fw-semibold fs-7">
        Complete la información del proveedor
      </span>
    </h3>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
    <div class="card-body">
      <div class="row mb-6">
        <label class="col-lg-2 col-form-label required fw-semibold fs-6">Nombre</label>
        <div class="col-lg-10">
          <input
            type="text"
            class="form-control form-control-solid"
            formControlName="name"
            placeholder="Nombre del proveedor"
          />
          <div *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="text-danger fs-7 mt-1">
            Campo requerido (mín. 2 caracteres)
          </div>
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-2 col-form-label fw-semibold fs-6">Representante</label>
        <div class="col-lg-10">
          <input
            type="text"
            class="form-control form-control-solid"
            formControlName="representative"
            placeholder="Nombre del representante"
          />
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-2 col-form-label required fw-semibold fs-6">Email de contacto</label>
        <div class="col-lg-10">
          <input
            type="email"
            class="form-control form-control-solid"
            formControlName="contactEmail"
            placeholder="proveedor@example.com"
          />
          <div *ngIf="form.get('contactEmail')?.invalid && form.get('contactEmail')?.touched" class="text-danger fs-7 mt-1">
            Email inválido
          </div>
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-2 col-form-label required fw-semibold fs-6">Teléfono de contacto</label>
        <div class="col-lg-10">
          <input
            type="text"
            class="form-control form-control-solid"
            formControlName="contactPhone"
            placeholder="+59170000000"
          />
          <div *ngIf="form.get('contactPhone')?.invalid && form.get('contactPhone')?.touched" class="text-danger fs-7 mt-1">
            Campo requerido
          </div>
        </div>
      </div>

      <!-- Dirección -->
      <div class="row mb-6">
        <label class="col-lg-2 col-form-label fw-semibold fs-6">Dirección</label>
        <div class="col-lg-10">
          <div class="row" formGroupName="address">
            <div class="col-md-6 mb-4">
              <input type="text" class="form-control form-control-solid" formControlName="street" placeholder="Calle" />
            </div>
            <div class="col-md-6 mb-4">
              <input type="text" class="form-control form-control-solid" formControlName="city" placeholder="Ciudad" />
            </div>
            <div class="col-md-6 mb-4">
              <input type="text" class="form-control form-control-solid" formControlName="state" placeholder="Estado / Depto" />
            </div>
            <div class="col-md-6 mb-4">
              <input type="text" class="form-control form-control-solid" formControlName="zipCode" placeholder="Código postal" />
            </div>
            <div class="col-md-12">
              <input type="text" class="form-control form-control-solid" formControlName="country" placeholder="País" />
            </div>
          </div>
        </div>
      </div>

      <!-- Datos fiscales -->
      <div class="row mb-6">
        <label class="col-lg-2 col-form-label fw-semibold fs-6">Tax ID</label>
        <div class="col-lg-10">
          <input type="text" class="form-control form-control-solid" formControlName="taxId" placeholder="NIT / CI" />
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-2 col-form-label fw-semibold fs-6">RFC</label>
        <div class="col-lg-10">
          <input type="text" class="form-control form-control-solid" formControlName="rfc" placeholder="RFC (opcional)" />
        </div>
      </div>

      <div class="row mb-6">
        <label class="col-lg-2 col-form-label fw-semibold fs-6">Términos de pago</label>
        <div class="col-lg-10">
          <input type="text" class="form-control form-control-solid" formControlName="paymentTerms" placeholder="Ej: 30 días" />
        </div>
      </div>

      <!-- Datos bancarios -->
      <div class="row mb-6">
        <label class="col-lg-2 col-form-label fw-semibold fs-6">Información bancaria</label>
        <div class="col-lg-10">
          <div class="row" formGroupName="bankInfo">
            <div class="col-md-6 mb-4">
              <input type="text" class="form-control form-control-solid" formControlName="accountNumber" placeholder="Número de cuenta" />
            </div>
            <div class="col-md-6 mb-4">
              <input type="text" class="form-control form-control-solid" formControlName="bankName" placeholder="Nombre del banco" />
            </div>
          </div>
        </div>
      </div>

      <!-- Estado -->
      <div class="row mb-6">
        <label class="col-lg-2 col-form-label fw-semibold fs-6">Estado</label>
        <div class="col-lg-10">
          <label class="form-check form-check-custom form-check-solid">
            <input class="form-check-input" type="checkbox" formControlName="isActive" />
            <span class="form-check-label fw-semibold">Activo</span>
          </label>
        </div>
      </div>

      <!-- Botones -->
      <div class="card-footer d-flex justify-content-end py-6 px-9">
        <button type="button" (click)="onCancel()" class="btn btn-light me-3">Cancelar</button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="form.invalid || submitting"
        >
          <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
          {{ submitting ? 'Guardando...' : (isEditMode ? 'Actualizar' : 'Crear') }}
        </button>
      </div>

      <div *ngIf="error" class="alert alert-danger mx-9">{{ error }}</div>
    </div>
  </form>
</div>
