
  <!-- begin::Card body -->
  <div class="card-body pt-0">
    <!-- Empty -->
    <div *ngIf="characteristics().length === 0" class="text-center py-10">
      <img src="/assets/imgs/empty-folder.svg" class="h-150px mb-5" alt="">
      <div class="text-gray-600 fs-5">No se encontraron características</div>
    </div>

    <!-- Grid -->
    <div *ngIf="characteristics().length > 0" class="row g-6">
      <div *ngFor="let c of characteristics()" class="col-xl-4 col-lg-6 col-md-6">
        <div class="card card-flush border-hover-primary">
          <div class="card-header min-h-60px">
            <div class="card-title">
              <h4 class="fw-bold text-gray-800 mb-1">{{ c.name }}</h4>
            </div>
            <div class="card-toolbar">
              <span
                class="badge"
                [ngClass]="{
                  'badge-light-success': c.isActive,
                  'badge-light-secondary': !c.isActive
                }"
              >
                {{ c.isActive ? 'Activa' : 'Inactiva' }}
              </span>
            </div>
          </div>

          <div class="card-body py-3">
            <div class="d-flex flex-column fs-6 text-gray-600 mb-5">
              <div class="d-flex justify-content-between mb-2">
                <span class="fw-semibold">Tipo:</span>
                <span class="text-gray-800">{{ c.type }}</span>
              </div>
              <div class="d-flex justify-content-between mb-2">
                <span class="fw-semibold">Requerido:</span>
                <span class="text-gray-800">{{ c.isRequired ? 'Sí' : 'No' }}</span>
              </div>
              <div class="d-flex justify-content-between">
                <span class="fw-semibold">Valores:</span>
                <span class="text-gray-800 text-truncate">
                  {{ c.possibleValues?.join(', ') || '—' }}
                </span>
              </div>
            </div>

            <!-- Acciones -->
            <div *ngIf="showActions()" class="d-flex gap-2">
              <button
                (click)="onSelect(c)"
                class="btn btn-icon btn-bg-light btn-active-color-primary btn-sm"
                title="Ver">
                <i class="bi bi-eye-fill fs-2"></i>
              </button>
              <button
                (click)="onEdit(c)"
                class="btn btn-icon btn-bg-light btn-active-color-warning btn-sm"
                title="Editar">
                <i class="bi bi-pencil-square fs-2"></i>
              </button>
              <button
                (click)="toggleActive(c)"
                class="btn btn-icon btn-bg-light btn-active-color-danger btn-sm"
                title="Activar / Desactivar">
                <i class="fas fa-toggle-on fs-2"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- end::Card body -->
