<!-- Spinner -->
<app-spinner *ngIf="loading" message="Cargando órdenes..."></app-spinner>

<div *ngIf="error && !loading" class="error-state">
  <h3>Error al cargar órdenes</h3>
  <p>{{ error }}</p>
  <button (click)="loadOrders()" class="btn btn-primary">Reintentar</button>
</div>

<!-- LISTADO -->
<div *ngIf="!loading && !error" class="orders-section">
  
  <app-stats-cards [cards]="statsCards" columnClass="col-xl-3"></app-stats-cards>

  <app-tabla-generica
    [data]="orders"
    [tablaColumns]="columns"
    [tablaOpciones]="tablaOpciones"
    (btnInlineEditRow)="saveInlineEdit($event)"
    (btnTableAction)="onTableAction($event)"
    (btnExtra)="onBtnExtra($event)"
  ></app-tabla-generica>

  <div *ngIf="orders.length === 0" class="empty-state">
    <div class="empty-icon">📦</div>
    <h3>No se encontraron órdenes</h3>
    <p *ngIf="searchTerm || statusFilter">
      Ajusta los filtros o
      <button (click)="searchTerm = ''; statusFilter = null; loadOrders()" class="btn-link">
        muestra todas
      </button>.
    </p>
    <p *ngIf="!searchTerm && !statusFilter">
      No hay órdenes registradas.
      <button *ngIf="canCreate" (click)="onCreateOrder()" class="btn-link">Crear la primera</button>
    </p>
  </div>
</div>
