<div class="product-list">
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando productos...</p>
  </div>

  <div *ngIf="error && !loading" class="error">
    <p>{{ error }}</p>
    <button (click)="loadProducts()" class="btn-retry">Reintentar</button>
  </div>

  <div *ngIf="!loading && !error && products.length === 0" class="empty">
    <p>No se encontraron productos</p>
  </div>

  <div *ngIf="!loading && !error && products.length > 0" class="products-grid">
    <div *ngFor="let product of products" class="product-card">
      <div class="product-image-wrapper">
        <img [src]="product.imageUrl || '/assets/imgs/product-no-image.png'" alt="{{ product.name }}" class="product-image" />
      </div>
      <div class="product-content">
        <h5 class="product-name">{{ product.name }}</h5>
        <p class="product-price">${{ product.salePrice | number:'1.2-2' }}</p>
        <div class="product-rating">
          <span class="stars">★★★★★</span>
          <span class="rating-text">(2)</span>
        </div>
        <button class="btn btn-primary btn-sm btn-add-cart" (click)="onSelectProduct(product)">
          Ver Producto
        </button>
      </div>
    </div>
  </div>
</div>
