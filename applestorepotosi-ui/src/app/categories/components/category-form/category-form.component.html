<!-- src/app/categories/components/category-form/category-form.component.html -->
<div class="category-form-container">
  <h2>{{ isEditMode ? 'Editar Categoría' : 'Crear Categoría' }}</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Nombre *</label>
      <input formControlName="name" placeholder="Ej: iPhone" />
      <div *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="error">
        Nombre requerido (mín. 2 caracteres)
      </div>
    </div>

    <div class="form-group">
      <label>Slug *</label>
      <input formControlName="slug" placeholder="ej-iphone" />
      <div *ngIf="form.get('slug')?.invalid && form.get('slug')?.touched" class="error">
        Slug requerido
      </div>
    </div>

    <div class="form-group">
      <label>Descripción</label>
      <textarea formControlName="description" rows="3"></textarea>
    </div>

    <div class="form-group">
      <label>Imagen URL</label>
      <input formControlName="imageUrl" placeholder="https://..." />
    </div>

    <div class="form-group">
      <label>Categoría padre</label>
      <input formControlName="parentId" placeholder="ID de Mongo (opcional)" />
    </div>

    <div class="form-group checkbox">
      <label><input type="checkbox" formControlName="isActive" /> Activa</label>
    </div>

    <div class="form-actions">
      <button type="button" (click)="onCancel()">Cancelar</button>
      <button type="submit" [disabled]="form.invalid || submitting">
        {{ submitting ? 'Guardando...' : (isEditMode ? 'Actualizar' : 'Crear') }}
      </button>
    </div>

    <div *ngIf="error" class="error-box">{{ error }}</div>
  </form>
</div>
