<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <!-- <img src="assets/logo.png" alt="Apple Store" class="logo"> -->
      <h1>Tienda Apple - Iniciar Sesión</h1>
    </div>

    <div class="login-content">
      <!-- BOTÓN GOOGLE -->
      <button 
        class="google-btn full-width"
        (click)="loginWithGoogle()"
        [disabled]="googleLoading">
        <!-- <img src="assets/google-icon.png" alt="Google" class="google-icon"> -->
        <span *ngIf="!googleLoading">Continuar con Google</span>
        <div *ngIf="googleLoading" class="spinner"></div>
      </button>

      <div class="separator">
        <span>o</span>
      </div>

      <!-- FORMULARIO EMAIL/PASSWORD -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            id="email"
            type="email" 
            formControlName="email"
            class="form-input"
            placeholder="tu@email.com">
          <div class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            <span *ngIf="loginForm.get('email')?.hasError('required')">Email es requerido</span>
            <span *ngIf="loginForm.get('email')?.hasError('email')">Email inválido</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            id="password"
            type="password" 
            formControlName="password"
            class="form-input"
            placeholder="••••••">
          <div class="error-message" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <span *ngIf="loginForm.get('password')?.hasError('required')">Contraseña es requerida</span>
            <span *ngIf="loginForm.get('password')?.hasError('minlength')">Mínimo 6 caracteres</span>
          </div>
        </div>

        <div class="error-message global-error" *ngIf="error">
          <span class="error-icon">⚠</span>
          {{ error }}
        </div>

        <button 
          type="submit" 
          class="login-btn full-width"
          [disabled]="loading || loginForm.invalid">
          <span *ngIf="!loading">Iniciar Sesión con Email</span>
          <div *ngIf="loading" class="spinner"></div>
        </button>
      </form>

      <div class="register-link">
        <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
      </div>
    </div>
  </div>
</div>
