<div class="sale-form-container">
  <div class="form-header">
    <h2>{{ isEditMode ? 'Editar Venta' : 'Crear Nueva Venta' }}</h2>
  </div>

  <form *ngIf="!loading" [formGroup]="saleForm" (ngSubmit)="onSubmit()" class="sale-form">
    <fieldset class="form-section">
      <legend>Información General</legend>
      <div class="form-group">
        <label>Cliente ID *</label>
        <input formControlName="customerId" placeholder="ID del cliente" />
      </div>
      <div class="form-group">
        <label>Fecha de Venta *</label>
        <input type="datetime-local" formControlName="saleDate" />
      </div>
      <div class="form-group">
        <label>Estado de la Venta *</label>
        <select formControlName="status">
          <option *ngFor="let s of saleStatuses" [value]="s">{{ s }}</option>
        </select>
      </div>
    </fieldset>

    <fieldset class="form-section">
      <legend>Pago</legend>
      <div formGroupName="payment" class="form-row">
        <div class="form-group">
          <label>Método</label>
          <select formControlName="method">
            <option *ngFor="let m of paymentMethods" [value]="m">{{ m }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estado del Pago</label>
          <select formControlName="status">
            <option *ngFor="let s of paymentStatuses" [value]="s">{{ s }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Referencia</label>
          <input formControlName="reference" placeholder="Referencia de pago" />
        </div>
      </div>
    </fieldset>

    <fieldset class="form-section">
      <legend>Totales</legend>
      <div formGroupName="totals" class="form-row">
        <div class="form-group">
          <label>Subtotal</label>
          <input type="number" formControlName="subtotal" />
        </div>
        <div class="form-group">
          <label>Impuesto</label>
          <input type="number" formControlName="taxAmount" />
        </div>
        <div class="form-group">
          <label>Descuento</label>
          <input type="number" formControlName="discountAmount" />
        </div>
        <div class="form-group">
          <label>Total</label>
          <input type="number" formControlName="totalAmount" />
        </div>
      </div>
    </fieldset>

    <div class="form-actions">
      <button type="button" (click)="onCancel()" class="btn btn-secondary">Cancelar</button>
      <button type="submit" class="btn btn-primary" [disabled]="saleForm.invalid || submitting">
        {{ submitting ? 'Guardando...' : (isEditMode ? 'Actualizar' : 'Crear') }}
      </button>
    </div>

    <div *ngIf="error" class="form-global-error">{{ error }}</div>
  </form>
</div>
