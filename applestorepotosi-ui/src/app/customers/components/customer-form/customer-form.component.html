<!-- src/app/customers/components/customer-form/customer-form.component.html -->
<div class="customer-form-container">
  <h2>{{ isEditMode ? 'Editar Cliente' : 'Crear Cliente' }}</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <!-- USUARIO (dropdown simple) -->
    <div class="form-group">
      <label>Usuario (opcional)</label>
      <div class="dropdown" (clickOutside)="closeDropdown()">
       <input
          type="text"
          placeholder="Buscar por nombre o email..."
          [formControl]="searchCtrl"
          (focus)="openDropdown()"
          (input)="onSearchInput($event)"
        />
        <button type="button" class="btn-dropdown" (click)="toggleDropdown()">▼</button>

        <ul class="dropdown-list" *ngIf="dropdownOpen">
          <li *ngIf="filteredUsers.length === 0">No hay coincidencias</li>
          <li
            *ngFor="let u of filteredUsers"
            (click)="selectUser(u)"
            [class.selected]="u._id === form.value.userId"
          >
            {{ u.displayName }} ({{ u.email }})
          </li>
        </ul>
      </div>
      <button type="button" (click)="clearUser()" class="btn-link">Quitar usuario</button>
      <small *ngIf="selectedUser">Actual: {{ selectedUser.displayName }}</small>
    </div>

    <!-- DATOS PERSONALES -->
    <div class="form-group">
      <label>Nombre completo *</label>
      <input formControlName="fullName" placeholder="Juan Pérez" />
      <div *ngIf="form.get('fullName')?.invalid && form.get('fullName')?.touched" class="error">
        Campo requerido (mín. 2 caracteres)
      </div>
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" formControlName="email" placeholder="juan@example.com" />
      <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="error">
        Email inválido
      </div>
    </div>

    <div class="form-group">
      <label>Teléfono *</label>
      <input formControlName="phone" placeholder="+59170000000" />
      <div *ngIf="form.get('phone')?.invalid && form.get('phone')?.touched" class="error">
        Campo requerido
      </div>
    </div>

    <div class="form-group">
      <label>Tax ID</label>
      <input formControlName="taxId" placeholder="NIT / CI" />
    </div>

    <!-- DIRECCIÓN -->
    <div class="form-group">
      <label>Dirección</label>
      <div formGroupName="address" class="sub-form">
        <input formControlName="street" placeholder="Calle" />
        <input formControlName="city" placeholder="Ciudad" />
        <input formControlName="state" placeholder="Estado / Depto" />
        <input formControlName="zipCode" placeholder="Código postal" />
        <input formControlName="country" placeholder="País" />
      </div>
    </div>

    <!-- LEALTAD -->
    <div class="form-group">
      <label>Puntos de lealtad</label>
      <input type="number" formControlName="loyaltyPoints" min="0" />
    </div>

    <div class="form-group checkbox">
      <label><input type="checkbox" formControlName="isActive" /> Activo</label>
    </div>

    <!-- BOTONES -->
    <div class="form-actions">
      <button type="button" (click)="onCancel()">Cancelar</button>
      <button type="submit" [disabled]="form.invalid || submitting">
        {{ submitting ? 'Guardando...' : (isEditMode ? 'Actualizar' : 'Crear') }}
      </button>
    </div>

    <div *ngIf="error" class="error-box">{{ error }}</div>
  </form>
</div>
