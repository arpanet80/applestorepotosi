name: Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-backend:
    name: Check Backend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: applestorepotosi-api/package-lock.json
      
      - name: Install Backend Dependencies
        working-directory: ./applestorepotosi-api
        run: npm ci
      
      - name: Lint Backend
        working-directory: ./applestorepotosi-api
        run: npm run lint
        continue-on-error: true
      
      - name: Build Backend
        working-directory: ./applestorepotosi-api
        run: npm run build
      
      - name: Run Backend Tests
        working-directory: ./applestorepotosi-api
        run: npm run test
        continue-on-error: true
      
      - name: Notify Success
        if: success()
        run: echo "✅ Backend build successful - Render will deploy automatically"

  check-frontend:
    name: Check Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: applestorepotosi-ui/package-lock.json
      
      - name: Install Frontend Dependencies
        working-directory: ./applestorepotosi-ui
        run: npm ci
      
      - name: Build Frontend for Production
        working-directory: ./applestorepotosi-ui
        run: npm run build:prod
      
      - name: Run Frontend Tests
        working-directory: ./applestorepotosi-ui
        run: npm run test
        continue-on-error: true
      
      - name: Notify Success
        if: success()
        run: echo "✅ Frontend build successful - Vercel will deploy automatically"
      
      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: applestorepotosi-ui/dist/
          retention-days: 7

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [check-backend, check-frontend]
    if: always()
    
    steps:
      - name: Check Status
        run: |
          if [ "${{ needs.check-backend.result }}" == "success" ] && [ "${{ needs.check-frontend.result }}" == "success" ]; then
            echo "🚀 All checks passed! Deploying to production..."
            echo "Backend: Render will deploy automatically"
            echo "Frontend: Vercel will deploy automatically"
          else
            echo "❌ Some checks failed. Deployment may be blocked."
            exit 1
          fi
